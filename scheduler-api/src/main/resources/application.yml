spring:
  application:
    name: job-scheduler
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/scheduler
    username: scheduler
    password: scheduler
  flyway:
    url: jdbc:postgresql://localhost:5432/scheduler
    user: scheduler
    password: scheduler

scheduler:
  worker-id: ${HOSTNAME:worker-local}
  shards: 16
  tick-ms: 100
  wheel-size: 64
  hydration-interval-ms: 5000
  hydration-window-ms: 60000
  hydration-batch-size: 10000
  missed-fire-threshold-ms: 5000
  max-catchup-fires: 100
  wheel-enabled: true
  claim-lease-seconds: 60
  outbox-poll-interval-ms: 200
  outbox-batch-size: 500
  coordination:
    election-interval-ms: 1000
    lease-ttl-seconds: 10
    heartbeat-interval-ms: 1000
    worker-ttl-seconds: 5
    assignment-poll-ms: 1000
  kafka:
    bootstrap-servers: localhost:9092
    topic: job-events
    retry-topic: job-events.retry
    dlq-topic: job-events.dlq
    consumer-group: job-scheduler
    max-attempts: 3
    partitions: 8

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: job-scheduler

logging:
  level:
    com.jobscheduler: INFO
