global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: job-scheduler
    metrics_path: /actuator/prometheus
    static_configs:
      # app2 only exists with the chaos overlay; a down target is harmless otherwise
      - targets: ["app:8080", "app2:8080"]
