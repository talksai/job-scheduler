# Overlay: a five-worker scheduler fleet for HA / chaos runs.
# Usage: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.chaos.yml up -d --build
# Workers: worker-1 :8080 (base) · worker-2 :8081 · worker-3 :8082 · worker-4 :8083 · worker-5 :8084
name: job-scheduler

x-worker: &worker
  build:
    context: ..
    dockerfile: Dockerfile
  depends_on:
    postgres:
      condition: service_healthy
    kafka:
      condition: service_healthy

x-worker-env: &worker-env
  SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/scheduler
  SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/scheduler
  SCHEDULER_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  SCHEDULER_COORDINATION_LEASE_TTL_SECONDS: "5"

services:
  app2:
    <<: *worker
    environment:
      <<: *worker-env
      HOSTNAME: worker-2
    ports:
      - "8081:8080"

  app3:
    <<: *worker
    environment:
      <<: *worker-env
      HOSTNAME: worker-3
    ports:
      - "8082:8080"

  app4:
    <<: *worker
    environment:
      <<: *worker-env
      HOSTNAME: worker-4
    ports:
      - "8083:8080"

  app5:
    <<: *worker
    environment:
      <<: *worker-env
      HOSTNAME: worker-5
    ports:
      - "8084:8080"
